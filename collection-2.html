<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collection | Trend Clout</title>

  <style>
    :root{
      --bg:#080716;
      --text:#ffffff;
      --muted:#c9c2d8;
      --line:rgba(255,255,255,.16);
      --accent:#ff8bbd;
      --accent2:#8ddcff;
      --green:#7CFFB2;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      background:
        radial-gradient(circle at 50% -10%, rgba(255,139,189,.35), transparent 34%),
        radial-gradient(circle at 85% 20%, rgba(141,220,255,.22), transparent 30%),
        linear-gradient(180deg,#0b0920 0%, #080716 45%, #050510 100%);
      color:white;
      font-family:Arial,sans-serif;
      min-height:100vh;
      overflow-x:hidden;
    }

    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}

    header{
      position:sticky;
      top:0;
      z-index:99;
      background:rgba(5,5,5,.75);
      backdrop-filter:blur(18px);
      border-bottom:1px solid var(--line);
    }

    nav{
      max-width:1180px;
      margin:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 18px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:22px;
      font-weight:1000;
      letter-spacing:-.8px;
    }

    .logo-mark{
      width:34px;
      height:34px;
      border-radius:12px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      box-shadow:0 0 30px rgba(255,139,189,.5);
    }

    .nav-link{
      border:1px solid var(--line);
      background:rgba(255,255,255,.07);
      color:white;
      padding:11px 16px;
      border-radius:999px;
      font-weight:900;
    }

    .wrap{
      max-width:1180px;
      margin:auto;
      padding:36px 18px 80px;
    }

    .hero{
      position:relative;
      border:1px solid var(--line);
      border-radius:36px;
      padding:46px 28px;
      overflow:hidden;
      background:
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(180deg,rgba(255,139,189,.20),rgba(141,220,255,.08)),
        repeating-linear-gradient(90deg,rgba(255,255,255,.055) 0px,rgba(255,255,255,.055) 8px,transparent 8px,transparent 34px);
      box-shadow:0 35px 100px rgba(0,0,0,.55);
      margin-bottom:30px;
    }

    .hero::after{
      content:"";
      position:absolute;
      width:420px;
      height:420px;
      right:8%;
      top:0;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,139,189,.35), rgba(141,220,255,.15), transparent 68%);
      filter:blur(14px);
      z-index:0;
    }

    .hero-content{
      position:relative;
      z-index:2;
      max-width:720px;
    }

    .tag{
      display:inline-block;
      background:rgba(124,255,178,.13);
      border:1px solid rgba(124,255,178,.45);
      color:#caffdc;
      padding:9px 13px;
      border-radius:999px;
      font-weight:900;
      font-size:13px;
      margin-bottom:18px;
    }

    h1{
      font-size:clamp(40px,7vw,76px);
      line-height:.95;
      letter-spacing:-3px;
      margin-bottom:18px;
    }

    .hero p{
      color:var(--muted);
      line-height:1.7;
      font-size:17px;
      max-width:560px;
    }

    .filters{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:26px;
    }

    .filter{
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:white;
      padding:12px 18px;
      border-radius:999px;
      font-weight:900;
      cursor:pointer;
      transition:.3s;
    }

    .filter:hover,
    .filter.active{
      background:white;
      color:#080716;
      transform:translateY(-3px);
    }

    .products{
      display:flex;
      gap:18px;
      overflow-x:auto;
      overflow-y:hidden;
      scroll-snap-type:x mandatory;
      padding:10px 0 28px;
      -webkit-overflow-scrolling:touch;
    }

    .products::-webkit-scrollbar{height:6px}
    .products::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,.25);
      border-radius:999px;
    }

    .card{
      min-width:330px;
      max-width:330px;
      flex:0 0 330px;
      scroll-snap-align:start;
      background:
        radial-gradient(circle at top right, rgba(255,139,189,.18), transparent 35%),
        linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.035));
      border:1px solid var(--line);
      border-radius:30px;
      padding:14px;
      transition:.35s;
      position:relative;
      overflow:hidden;
      box-shadow:0 24px 70px rgba(0,0,0,.32);
    }

    .card:hover{
      transform:translateY(-12px) scale(1.02);
      border-color:rgba(255,139,189,.65);
      box-shadow:0 35px 95px rgba(255,139,189,.18);
    }

    .imgbox{
      height:330px;
      border-radius:24px;
      overflow:hidden;
      position:relative;
      background:radial-gradient(circle at center, rgba(255,139,189,.18), transparent 55%), rgba(255,255,255,.035);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .imgbox img{
      width:100%;
      height:100%;
      object-fit:contain;
      padding:18px;
      border-radius:0;
      filter:drop-shadow(0 28px 35px rgba(0,0,0,.75));
      transition:.6s ease;
    }

    .card:hover .imgbox img{
      transform:scale(1.08) rotate(-2deg) translateY(-8px);
    }

    .label{
      position:absolute;
      top:22px;
      left:22px;
      background:rgba(0,0,0,.55);
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 11px;
      font-size:12px;
      font-weight:900;
      z-index:5;
    }

    .info{padding:18px 4px 4px}
    .info h3{
      font-size:22px;
      line-height:1.15;
      margin-bottom:8px;
    }
    .info p{
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
      margin-bottom:16px;
    }

    .price-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .price{
      color:var(--accent2);
      font-size:24px;
      font-weight:1000;
    }

    .add{
      background:white;
      color:#080716;
      padding:12px 16px;
      border-radius:999px;
      font-weight:1000;
      border:none;
      white-space:nowrap;
    }

    .empty{
      width:100%;
      padding:28px;
      border:1px dashed var(--line);
      border-radius:24px;
      color:var(--muted);
      text-align:center;
    }

    .reveal{
      opacity:0;
      transform:scale(.92) translateY(40px);
      transition:all .8s ease;
    }
    .reveal.active{
      opacity:1;
      transform:scale(1) translateY(0);
    }

    @media(max-width:860px){
      .wrap{padding:28px 16px 60px}
      h1{letter-spacing:-1.5px}
      .hero{padding:38px 22px}
      .card{
        min-width:86vw;
        max-width:86vw;
        flex:0 0 86vw;
      }
      .nav-link{display:none}
    }
  </style>
</head>

<body>
  <header>
    <nav>
      <a href="trend_clout_premium_index.html" class="logo">
        <span class="logo-mark"></span>
        Trend Clout
      </a>
      <a href="trend_clout_premium_index.html#shop" class="nav-link">Back to Shop</a>
    </nav>
  </header>

  <main class="wrap">
    <section class="hero reveal">
      <div class="hero-content">
        <div class="tag" id="collectionTag">Collection</div>
        <h1 id="collectionTitle">Trend Clout Collection</h1>
        <p id="collectionText">Premium oversized tees built for people who move different.</p>
      </div>
    </section>

    <div class="filters">
      <button class="filter" onclick="goCollection('all')">All</button>
      <button class="filter" onclick="goCollection('cars')">Cars</button>
      <button class="filter" onclick="goCollection('creator')">Creator</button>
      <button class="filter" onclick="goCollection('streetwear')">Streetwear</button>
      <button class="filter" onclick="goCollection('motivation')">Motivation</button>
      <button class="filter" onclick="goCollection('power')">Power</button>
      
    </div>

    <section class="products" id="collectionProducts"></section>
  </main>
<script src="Product.js"></script>
  <script>
   
    const collectionInfo = {
      all:{
        title:"All Drops",
        tag:"All Products",
        text:"Explore every premium oversized tee from Trend Clout."
      },
      cars:{
        title:"Supreme Car Collection",
        tag:"Cars Collection",
        text:"Streetwear inspired by speed, night drives, supercars, and youth car culture."
      },
      creator:{
        title:"Creator Collection",
        tag:"Creator Vibe",
        text:"Clean oversized tees for creators, builders, students, and people creating their own path."
      },
      streetwear:{
        title:"Streetwear Collection",
        tag:"Streetwear",
        text:"Clean everyday oversized fits made for confidence and presence."
      },
      motivation:{
        title:"Motivational Vibe",
        tag:"Motivation",
        text:"Bold designs for people chasing growth, hustle, and stronger mindset."
      },
      power:{
        title:"Power Mindset Collection",
        tag:"Power",
        text:"Premium graphics built around strength, status, and dominance."
      }
    };

    const params = new URLSearchParams(window.location.search);
    let type = params.get("type") || "all";

    // Safety fix: if wrong type comes, page does not go blank.
    if(!collectionInfo[type]){
      type = "all";
    }

    function renderCollection(){
      const info = collectionInfo[type];

      document.getElementById("collectionTitle").innerText = info.title;
      document.getElementById("collectionTag").innerText = info.tag;
      document.getElementById("collectionText").innerText = info.text;
      document.title = info.title + " | Trend Clout";

      document.querySelectorAll(".filter").forEach(btn=>{
        btn.classList.remove("active");
        if(btn.innerText.toLowerCase() === type || (type === "all" && btn.innerText.toLowerCase() === "all")){
          btn.classList.add("active");
        }
      });

      const filtered = type === "all" ? products : products.filter(p => p.category === type);
      const box = document.getElementById("collectionProducts");
      box.innerHTML = "";

      if(filtered.length === 0){
        box.innerHTML = "<div class='empty'>No products found in this collection yet.</div>";
        return;
      }

      filtered.forEach((p)=>{
        box.innerHTML += `
          <article class="card reveal">
            <span class="label">${p.label}</span>
            <div class="imgbox">
              <img src="${p.img}" alt="${p.name}">
            </div>
            <div class="info">
              <h3>${p.name}</h3>
              <p>Oversized fit • Premium cotton • COD available</p>
              <div class="price-row">
                <div class="price">₹${p.price}</div>
                <a class="add" href="${p.productPage}">View Product</a>
              </div>
            </div>
          </article>
        `;
      });

      revealOnScroll();
    }

    function goCollection(newType){
  type = newType;

  if(!collectionInfo[type]){
    type = "all";
  }

  renderCollection();

  window.history.pushState({}, "", "collection.html?type=" + type);
    }

    function revealOnScroll(){
      const elements = document.querySelectorAll(".reveal");
      elements.forEach(el => {
        const windowHeight = window.innerHeight;
        const elementTop = el.getBoundingClientRect().top;
        if(elementTop < windowHeight - 80){
          el.classList.add("active");
        }
      });
    }

    window.addEventListener("scroll", revealOnScroll);
    renderCollection();
    revealOnScroll();
  </script>
</body>
</html>
